# ===========================================
# VeinSim - Docker Compose
# ===========================================
# Usage:
#   cp .env.example .env
#   docker compose up -d --build
# ===========================================

services:
  # ---------- Database ----------
  db:
    image: postgres:16-alpine
    container_name: veinsim_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: veinsim_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- MinIO (Object Storage) ----------
  minio:
    image: minio/minio:latest
    container_name: veinsim_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------- Backend API (FastAPI) ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veinsim_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      OPENFOAM_CASES_DIR: ${OPENFOAM_CASES_DIR}
      SOLVER_MOCK: ${SOLVER_MOCK}
    volumes:
      - ./backend:/app
      - simulation_data:/opt/openfoam/cases
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ---------- Celery Worker ----------
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veinsim_celery_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      OPENFOAM_CASES_DIR: ${OPENFOAM_CASES_DIR}
      SOLVER_TIMEOUT_SECONDS: ${SOLVER_TIMEOUT_SECONDS}
      SOLVER_MOCK: ${SOLVER_MOCK}
    volumes:
      - ./backend:/app
      - simulation_data:/opt/openfoam/cases
    depends_on:
      - backend
      - redis
    command: celery -A app.celery_worker worker --loglevel=info --concurrency=2

  # ---------- Frontend (React + Vite) ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: veinsim_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_WS_BASE_URL: ${VITE_WS_BASE_URL}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pg_data:
  minio_data:
  simulation_data:
